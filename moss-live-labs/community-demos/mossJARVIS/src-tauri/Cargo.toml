[package]
name = "jarvis"
version = "0.1.0"
description = "Jarvis voice assistant HUD"
authors = ["Sanjeev Kumar"]
edition = "2021"

[lib]
name = "jarvis_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
url = "2"

