[project]
name = "moss-connectors"
version = "0.0.1"
description = "One-shot data connectors that ingest external databases into Moss indexes."
readme = "README.md"
requires-python = ">=3.10,<3.15"
license = { text = "BSD-2-Clause" }
authors = [{ name = "InferEdge Inc.", email = "contact@moss.dev" }]
keywords = ["moss", "connectors", "ingest", "etl", "vector", "search"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "moss>=1.0.0",
    "pydantic>=2.0.0",
]

# Add a new entry here when you contribute a connector that needs a driver.
# Users install via: pip install "moss-connectors[postgres]"
[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]
# mysql    = ["pymysql>=1.1"]
# mongodb  = ["pymongo>=4.6"]
# supabase = ["supabase>=2.0"]

dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "python-dotenv>=1.0.0",
    "ruff>=0.5.0",
]

[project.urls]
Homepage = "https://github.com/usemoss/moss"
Repository = "https://github.com/usemoss/moss"
Source = "https://github.com/usemoss/moss/tree/main/packages/moss-connectors"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "python-dotenv>=1.2.2",
]
