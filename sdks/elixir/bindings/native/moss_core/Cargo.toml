[package]
name = "moss_core"
version = "0.9.0"
edition = "2021"
license = "BSD-2-Clause"
publish = false
repository = "https://github.com/usemoss/moss"

[lib]
name = "moss_core"
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37"
moss = { path = "AVAILABLE_VIA_PREBUILT_BINARIES" }
tokio = { version = "1", features = ["rt-multi-thread"] }
once_cell = "1"
