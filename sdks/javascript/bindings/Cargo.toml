
[package]
edition = "2024"
name = "moss-core-js"
version = "0.8.7"
license = "BSD-2-Clause"
publish = false
description = "NAPI bindings for the Moss semantic search engine (Node.js native addon)"
repository = "https://github.com/usemoss/moss"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.0.0", features = ["tokio_rt", "serde-json"] }
napi-derive = "3.0.0"
# The `moss` crate is not included in this repository.
# Pre-built binaries are available on npm: npm install @anthropic-ai/moss-core
moss = { path = "AVAILABLE_VIA_PREBUILT_BINARIES" }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
