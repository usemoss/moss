name: Publish moss-connector-dynamodb

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: moss-connector-dynamodb-release
  cancel-in-progress: false

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from pyproject
        id: compute
        shell: python
        run: |
          import os, pathlib, re, sys

          text = pathlib.Path("packages/moss-data-connector/moss-connector-dynamodb/pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"', text)
          if not match:
              print("Could not find version in pyproject", file=sys.stderr)
              sys.exit(1)
          version = match.group(1)

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")

          print(f"Publishing version: {version}")

  build-and-publish:
    needs: determine-version
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.determine-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        working-directory: packages/moss-data-connector/moss-connector-dynamodb
        run: |
          rm -rf dist
          python -m build

      - name: Smoke test import
        shell: python
        run: |
          import glob, subprocess, sys

          wheels = glob.glob("packages/moss-data-connector/moss-connector-dynamodb/dist/*.whl")
          if not wheels:
              raise SystemExit("No wheel found in dist/")

          wheel = wheels[0]
          subprocess.check_call([sys.executable, "-m", "pip", "install", "--force-reinstall", wheel])

          import importlib
          module = importlib.import_module("moss_connector_dynamodb")
          print("import ok; sample attrs:", dir(module)[:5])

      - name: Publish to PyPI
        if: matrix.python == '3.11'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --skip-existing packages/moss-data-connector/moss-connector-dynamodb/dist/*

      - name: Tag release
        if: matrix.python == '3.11'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git fetch --tags --force
          if git rev-parse "moss-connector-dynamodb-v${VERSION}" >/dev/null 2>&1; then
            echo "Tag moss-connector-dynamodb-v${VERSION} already exists"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git tag "moss-connector-dynamodb-v${VERSION}"
            git push origin "moss-connector-dynamodb-v${VERSION}"
          fi
