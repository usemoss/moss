name: Publish n8n-nodes-moss

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: n8n-nodes-moss-release
  cancel-in-progress: false

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version from package.json
        id: compute
        shell: bash
        run: |
          cd packages/n8n-nodes-moss
          VERSION=$(node -p "require('./package.json').version")

          if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            :
          else
            echo "Invalid version in package.json: $VERSION" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

  build-and-publish:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_DIR: packages/n8n-nodes-moss
      VERSION: ${{ needs.determine-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: ${{ env.PKG_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm ci --ignore-scripts

      - name: Build package
        working-directory: ${{ env.PKG_DIR }}
        run: npm run build

      - name: Test package
        working-directory: ${{ env.PKG_DIR }}
        run: npm test

      - name: Publish to npm
        working-directory: ${{ env.PKG_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: npm publish --access public

      - name: Tag release
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git fetch --tags --force
          if git rev-parse "n8n-nodes-moss-v${VERSION}" >/dev/null 2>&1; then
            echo "Tag n8n-nodes-moss-v${VERSION} already exists"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git tag "n8n-nodes-moss-v${VERSION}"
            git push origin "n8n-nodes-moss-v${VERSION}"
          fi
