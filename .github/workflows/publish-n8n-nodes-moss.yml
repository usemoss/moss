name: Publish n8n-nodes-moss

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: n8n-nodes-moss-release
  cancel-in-progress: false

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version from package.json
        id: compute
        shell: bash
        run: |
          cd packages/n8n-nodes-moss
          VERSION=$(node -p "require('./package.json').version")

          if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            :
          else
            echo "Invalid version in package.json: $VERSION" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

  build-and-publish:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_DIR: packages/n8n-nodes-moss
      VERSION: ${{ needs.determine-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: ${{ env.PKG_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm ci --ignore-scripts

      - name: Build package
        working-directory: ${{ env.PKG_DIR }}
        run: npm run build

      - name: Test package
        working-directory: ${{ env.PKG_DIR }}
        run: npm test

      - name: Validate release tag before publish
        id: tagcheck
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git fetch --tags --force
          TAG="n8n-nodes-moss-v${VERSION}"
          HEAD_SHA="$(git rev-parse HEAD)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "head=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "refs/tags/$TAG")"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
            if [[ "$TAG_SHA" != "$HEAD_SHA" ]]; then
              echo "ERROR: $TAG points at ${TAG_SHA}, but this checkout is ${HEAD_SHA}."
              echo "Refusing to publish HEAD because an existing tag already claims this version."
              exit 1
            fi
            echo "Tag $TAG already points at HEAD"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether version is already published
        id: published
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if npm view "n8n-nodes-moss@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "n8n-nodes-moss@${VERSION} is already on npm; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        working-directory: ${{ env.PKG_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        # --ignore-scripts avoids re-running prepublishOnly after the explicit build/test steps
        run: npm publish --access public --ignore-scripts

      - name: Tag release
        env:
          VERSION: ${{ env.VERSION }}
          ALREADY_PUBLISHED: ${{ steps.published.outputs.exists }}
          TAG_EXISTS: ${{ steps.tagcheck.outputs.exists }}
          TAG: ${{ steps.tagcheck.outputs.tag }}
        run: |
          if [[ "$TAG_EXISTS" == "true" ]]; then
            echo "Tag $TAG already points at HEAD; nothing to do"
            exit 0
          fi

          if [[ "$ALREADY_PUBLISHED" == "true" ]]; then
            echo "ERROR: n8n-nodes-moss@${VERSION} is already on npm, but git tag $TAG is missing."
            echo "Refusing to tag the current checkout because it may not match the published artifact."
            echo "Recover manually: identify the commit that produced the npm package, then:"
            echo "  git tag $TAG <published-commit-sha>"
            echo "  git push origin $TAG"
            exit 1
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
