name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        if [ -f examples/python/requirements.txt ]; then pip install -r examples/python/requirements.txt; fi
    - name: Lint with ruff
      run: ruff check examples/python apps/pipecat-moss apps/livekit-moss-vercel
    - name: Type check with mypy
      run: mypy examples/python apps/pipecat-moss apps/livekit-moss-vercel --ignore-missing-imports

  javascript-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: examples/javascript/package-lock.json
    - name: Install dependencies
      working-directory: examples/javascript
      run: npm ci
    - name: Lint
      working-directory: examples/javascript
      run: npm run lint
    - name: Type check
      working-directory: examples/javascript
      run: npm run type-check
