name: Bug Report
description: Report a reproducible bug in Moss
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please use this form for reproducible defects in Moss. If you are not yet sure whether you have found a bug, or you need help debugging your setup, use the community Discord first: https://moss.link/discord

        Do not report security vulnerabilities here. Follow the private reporting instructions in `SECURITY.md` and email contact@moss.dev instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps that reliably reproduces the problem.
      placeholder: |
        1. Install or configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened instead?
      placeholder: Describe the observed result, including errors if available.
    validations:
      required: true

  - type: dropdown
    id: sdk_language
    attributes:
      label: SDK / language
      description: Which SDK, language, or example is affected?
      options:
        - TypeScript / JavaScript
        - Python
        - Next.js example app
        - Pipecat example
        - LiveKit example
        - VitePress plugin
        - Other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, release tag, or commit SHA.
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
