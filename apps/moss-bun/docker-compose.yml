version: '3.8'

services:
  moss-bun:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moss-bun-app
    ports:
      - "3000:3000"
    environment:
      # Moss credentials - set these in .env file
      MOSS_PROJECT_ID: ${MOSS_PROJECT_ID}
      MOSS_PROJECT_KEY: ${MOSS_PROJECT_KEY}
      # Server configuration
      PORT: 3000
      DEFAULT_INDEX: default
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    # Limit resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    # Add logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
