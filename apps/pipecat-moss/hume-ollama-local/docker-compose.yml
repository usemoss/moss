services:
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    ports:
      - "7860:8080"
    depends_on:
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama_data:
